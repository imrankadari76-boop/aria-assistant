<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>ARIA — Your Personal Assistant</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Exo+2:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #050a12;
    --surface: #0a1628;
    --surface2: #0f1f3d;
    --accent: #00d4ff;
    --accent2: #0080ff;
    --accent3: #7b2fff;
    --text: #e0f0ff;
    --text-dim: #5a8aaa;
    --user-bubble: #0f2a4a;
    --ai-bubble: #091a2e;
    --glow: 0 0 20px rgba(0,212,255,0.3);
    --glow-strong: 0 0 40px rgba(0,212,255,0.5);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Exo 2', sans-serif;
    height: 100dvh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
    position: relative;
  }

  /* Animated background grid */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(0,212,255,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(0,212,255,0.03) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none;
    z-index: 0;
  }

  /* Glowing orb background */
  body::after {
    content: '';
    position: fixed;
    width: 400px;
    height: 400px;
    background: radial-gradient(circle, rgba(0,128,255,0.08) 0%, transparent 70%);
    top: -100px;
    right: -100px;
    pointer-events: none;
    z-index: 0;
    animation: orbFloat 8s ease-in-out infinite;
  }

  @keyframes orbFloat {
    0%, 100% { transform: translate(0, 0); }
    50% { transform: translate(-30px, 30px); }
  }

  /* Header */
  .header {
    position: relative;
    z-index: 10;
    padding: 16px 20px;
    display: flex;
    align-items: center;
    gap: 14px;
    border-bottom: 1px solid rgba(0,212,255,0.1);
    background: rgba(5,10,18,0.8);
    backdrop-filter: blur(10px);
  }

  .avatar {
    width: 44px;
    height: 44px;
    border-radius: 50%;
    background: linear-gradient(135deg, var(--accent2), var(--accent3));
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 20px;
    box-shadow: var(--glow);
    flex-shrink: 0;
    position: relative;
    animation: avatarPulse 3s ease-in-out infinite;
  }

  @keyframes avatarPulse {
    0%, 100% { box-shadow: 0 0 15px rgba(0,212,255,0.3); }
    50% { box-shadow: 0 0 30px rgba(0,212,255,0.6); }
  }

  .avatar-ring {
    position: absolute;
    inset: -3px;
    border-radius: 50%;
    border: 1px solid rgba(0,212,255,0.4);
    animation: ringRotate 6s linear infinite;
  }

  @keyframes ringRotate {
    from { transform: rotate(0deg); }
    to { transform: rotate(360deg); }
  }

  .header-info h1 {
    font-family: 'Orbitron', monospace;
    font-size: 16px;
    font-weight: 700;
    color: var(--accent);
    letter-spacing: 3px;
    text-shadow: var(--glow);
  }

  .status {
    font-size: 11px;
    color: var(--text-dim);
    letter-spacing: 1px;
    display: flex;
    align-items: center;
    gap: 5px;
    margin-top: 2px;
  }

  .status-dot {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: #00ff88;
    box-shadow: 0 0 8px #00ff88;
    animation: blink 2s ease-in-out infinite;
  }

  @keyframes blink {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.3; }
  }

  .mode-badge {
    margin-left: auto;
    padding: 4px 10px;
    border-radius: 20px;
    font-size: 10px;
    font-family: 'Orbitron', monospace;
    letter-spacing: 1px;
    border: 1px solid;
    transition: all 0.4s ease;
  }

  .mode-badge.offline {
    color: #ff6b35;
    border-color: rgba(255,107,53,0.4);
    background: rgba(255,107,53,0.08);
    text-shadow: 0 0 8px rgba(255,107,53,0.5);
  }

  .mode-badge.online {
    color: #00ff88;
    border-color: rgba(0,255,136,0.4);
    background: rgba(0,255,136,0.08);
    text-shadow: 0 0 8px rgba(0,255,136,0.5);
  }

  /* Chat area */
  .chat {
    flex: 1;
    overflow-y: auto;
    padding: 20px 16px;
    display: flex;
    flex-direction: column;
    gap: 16px;
    position: relative;
    z-index: 1;
    scroll-behavior: smooth;
  }

  .chat::-webkit-scrollbar { width: 3px; }
  .chat::-webkit-scrollbar-track { background: transparent; }
  .chat::-webkit-scrollbar-thumb { background: rgba(0,212,255,0.2); border-radius: 3px; }

  .message {
    display: flex;
    gap: 10px;
    animation: msgIn 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
    max-width: 88%;
  }

  @keyframes msgIn {
    from { opacity: 0; transform: translateY(15px) scale(0.95); }
    to { opacity: 1; transform: translateY(0) scale(1); }
  }

  .message.user { flex-direction: row-reverse; align-self: flex-end; }
  .message.ai { align-self: flex-start; }

  .msg-avatar {
    width: 30px;
    height: 30px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 13px;
    flex-shrink: 0;
    margin-top: 2px;
  }

  .message.ai .msg-avatar {
    background: linear-gradient(135deg, var(--accent2), var(--accent3));
    box-shadow: 0 0 12px rgba(0,128,255,0.4);
  }

  .message.user .msg-avatar {
    background: linear-gradient(135deg, #1a3a5c, #0d2240);
    border: 1px solid rgba(0,212,255,0.2);
  }

  .bubble {
    padding: 12px 16px;
    border-radius: 16px;
    font-size: 14px;
    line-height: 1.6;
    font-weight: 300;
    position: relative;
  }

  .message.ai .bubble {
    background: var(--ai-bubble);
    border: 1px solid rgba(0,212,255,0.12);
    border-radius: 4px 16px 16px 16px;
    color: var(--text);
  }

  .message.user .bubble {
    background: var(--user-bubble);
    border: 1px solid rgba(0,128,255,0.2);
    border-radius: 16px 4px 16px 16px;
    color: var(--text);
  }

  .bubble-time {
    font-size: 10px;
    color: var(--text-dim);
    margin-top: 5px;
    letter-spacing: 0.5px;
  }

  /* Typing indicator */
  .typing {
    display: flex;
    gap: 5px;
    padding: 14px 18px;
    align-items: center;
  }

  .typing span {
    width: 7px;
    height: 7px;
    border-radius: 50%;
    background: var(--accent);
    animation: typingDot 1.2s ease-in-out infinite;
    box-shadow: 0 0 8px var(--accent);
  }

  .typing span:nth-child(2) { animation-delay: 0.2s; }
  .typing span:nth-child(3) { animation-delay: 0.4s; }

  @keyframes typingDot {
    0%, 60%, 100% { transform: translateY(0); opacity: 0.4; }
    30% { transform: translateY(-6px); opacity: 1; }
  }

  /* Welcome screen */
  .welcome {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    flex: 1;
    text-align: center;
    padding: 30px 20px;
    gap: 16px;
    animation: fadeIn 0.8s ease;
  }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(20px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .welcome-icon {
    width: 80px;
    height: 80px;
    border-radius: 50%;
    background: linear-gradient(135deg, var(--accent2), var(--accent3));
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 36px;
    box-shadow: var(--glow-strong);
    animation: welcomePulse 3s ease-in-out infinite;
  }

  @keyframes welcomePulse {
    0%, 100% { transform: scale(1); box-shadow: 0 0 30px rgba(0,212,255,0.4); }
    50% { transform: scale(1.05); box-shadow: 0 0 60px rgba(0,212,255,0.7); }
  }

  .welcome h2 {
    font-family: 'Orbitron', monospace;
    font-size: 22px;
    color: var(--accent);
    letter-spacing: 3px;
    text-shadow: var(--glow);
  }

  .welcome p {
    color: var(--text-dim);
    font-size: 13px;
    line-height: 1.7;
    max-width: 280px;
  }

  .suggestions {
    display: flex;
    flex-direction: column;
    gap: 8px;
    width: 100%;
    max-width: 300px;
    margin-top: 8px;
  }

  .suggestion-btn {
    padding: 10px 16px;
    background: rgba(0,212,255,0.05);
    border: 1px solid rgba(0,212,255,0.15);
    border-radius: 10px;
    color: var(--text-dim);
    font-family: 'Exo 2', sans-serif;
    font-size: 12px;
    cursor: pointer;
    text-align: left;
    transition: all 0.25s ease;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .suggestion-btn:hover, .suggestion-btn:active {
    background: rgba(0,212,255,0.1);
    border-color: rgba(0,212,255,0.4);
    color: var(--text);
    transform: translateX(4px);
  }

  /* Input area */
  .input-area {
    position: relative;
    z-index: 10;
    padding: 12px 16px 20px;
    background: rgba(5,10,18,0.9);
    backdrop-filter: blur(10px);
    border-top: 1px solid rgba(0,212,255,0.1);
  }

  .input-row {
    display: flex;
    gap: 10px;
    align-items: flex-end;
  }

  .input-wrap {
    flex: 1;
    background: var(--surface);
    border: 1px solid rgba(0,212,255,0.15);
    border-radius: 24px;
    display: flex;
    align-items: center;
    padding: 4px 8px 4px 16px;
    gap: 8px;
    transition: border-color 0.3s ease, box-shadow 0.3s ease;
  }

  .input-wrap:focus-within {
    border-color: rgba(0,212,255,0.5);
    box-shadow: 0 0 20px rgba(0,212,255,0.1);
  }

  #userInput {
    flex: 1;
    background: transparent;
    border: none;
    outline: none;
    color: var(--text);
    font-family: 'Exo 2', sans-serif;
    font-size: 14px;
    font-weight: 300;
    padding: 10px 0;
    resize: none;
    max-height: 100px;
    line-height: 1.5;
  }

  #userInput::placeholder { color: var(--text-dim); }

  .mic-btn {
    width: 36px;
    height: 36px;
    border-radius: 50%;
    border: none;
    background: transparent;
    color: var(--text-dim);
    font-size: 18px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.25s ease;
    flex-shrink: 0;
  }

  .mic-btn:hover { color: var(--accent); }
  .mic-btn.listening {
    color: #ff4444;
    animation: micPulse 1s ease-in-out infinite;
  }

  @keyframes micPulse {
    0%, 100% { transform: scale(1); }
    50% { transform: scale(1.2); }
  }

  .send-btn {
    width: 48px;
    height: 48px;
    border-radius: 50%;
    border: none;
    background: linear-gradient(135deg, var(--accent2), var(--accent3));
    color: white;
    font-size: 18px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    box-shadow: var(--glow);
    transition: all 0.25s ease;
    flex-shrink: 0;
  }

  .send-btn:hover { transform: scale(1.05); box-shadow: var(--glow-strong); }
  .send-btn:active { transform: scale(0.95); }

  /* Voice listening overlay */
  .voice-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(5,10,18,0.95);
    z-index: 100;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 24px;
  }

  .voice-overlay.active { display: flex; }

  .voice-rings {
    position: relative;
    width: 120px;
    height: 120px;
  }

  .voice-ring {
    position: absolute;
    inset: 0;
    border-radius: 50%;
    border: 2px solid var(--accent);
    animation: voiceRing 2s ease-out infinite;
  }

  .voice-ring:nth-child(2) { animation-delay: 0.5s; }
  .voice-ring:nth-child(3) { animation-delay: 1s; }

  @keyframes voiceRing {
    from { transform: scale(0.5); opacity: 1; }
    to { transform: scale(2); opacity: 0; }
  }

  .voice-center {
    position: absolute;
    inset: 20px;
    border-radius: 50%;
    background: linear-gradient(135deg, var(--accent2), var(--accent3));
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 32px;
    box-shadow: var(--glow-strong);
  }

  .voice-text {
    font-family: 'Orbitron', monospace;
    font-size: 14px;
    color: var(--accent);
    letter-spacing: 3px;
  }

  .voice-cancel {
    padding: 12px 32px;
    background: transparent;
    border: 1px solid rgba(255,68,68,0.4);
    border-radius: 24px;
    color: #ff4444;
    font-family: 'Exo 2', sans-serif;
    font-size: 13px;
    cursor: pointer;
    letter-spacing: 1px;
    transition: all 0.25s ease;
  }

  .voice-cancel:hover {
    background: rgba(255,68,68,0.1);
  }

  /* Speak indicator on message */
  .speak-btn {
    background: none;
    border: none;
    color: var(--text-dim);
    font-size: 13px;
    cursor: pointer;
    padding: 2px 6px;
    border-radius: 4px;
    transition: color 0.2s;
    display: inline-flex;
    align-items: center;
    gap: 3px;
  }
  .speak-btn:hover { color: var(--accent); }

  .msg-actions {
    display: flex;
    align-items: center;
    gap: 4px;
    margin-top: 4px;
  }

  /* Scrollbar fix for mobile */
  @media (max-width: 480px) {
    .header { padding: 12px 14px; }
    .chat { padding: 14px 12px; }
    .input-area { padding: 10px 12px 16px; }
  }
</style>
</head>
<body>

<!-- Header -->
<div class="header">
  <div class="avatar">
    🤖
    <div class="avatar-ring"></div>
  </div>
  <div class="header-info">
    <h1>ARIA</h1>
    <div class="status">
      <div class="status-dot"></div>
      <span>SYSTEM ACTIVE</span>
    </div>
  </div>
  <div class="mode-badge offline" id="modeBadge">OFFLINE</div>
</div>

<!-- Chat Messages -->
<div class="chat" id="chat">
  <div class="welcome" id="welcome">
    <div class="welcome-icon">🤖</div>
    <h2>ARIA</h2>
    <p>Artificial Responsive Intelligence Assistant. I'm ready to help you — type or speak your question.</p>
    <div class="suggestions">
      <button class="suggestion-btn" onclick="sendSuggestion('What can you do?')">💡 What can you do?</button>
      <button class="suggestion-btn" onclick="sendSuggestion('Tell me a fun fact')">🌍 Tell me a fun fact</button>
      <button class="suggestion-btn" onclick="sendSuggestion('What is the time?')">🕐 What is the time?</button>
      <button class="suggestion-btn" onclick="sendSuggestion('Tell me a joke')">😄 Tell me a joke</button>
    </div>
  </div>
</div>

<!-- Voice Overlay -->
<div class="voice-overlay" id="voiceOverlay">
  <div class="voice-rings">
    <div class="voice-ring"></div>
    <div class="voice-ring"></div>
    <div class="voice-ring"></div>
    <div class="voice-center">🎤</div>
  </div>
  <div class="voice-text">LISTENING...</div>
  <button class="voice-cancel" onclick="stopListening()">✕ CANCEL</button>
</div>

<!-- Input Area -->
<div class="input-area">
  <div class="input-row">
    <div class="input-wrap">
      <textarea id="userInput" placeholder="Ask me anything..." rows="1"></textarea>
      <button class="mic-btn" id="micBtn" onclick="toggleVoice()">🎤</button>
    </div>
    <button class="send-btn" onclick="sendMessage()">➤</button>
  </div>
</div>

<script>
  // ─── Knowledge Base (Offline AI Brain) ─────────────────────────────────────
  const KB = {
    greetings: {
      patterns: ['hello', 'hi', 'hey', 'good morning', 'good evening', 'good afternoon', 'howdy', 'what\'s up', 'sup'],
      responses: [
        "Hello! I'm ARIA, your personal assistant. How can I help you today?",
        "Hey there! Great to see you. What can I do for you?",
        "Hi! ARIA is online and ready. What do you need?",
        "Hello! I'm here and listening. Ask me anything!"
      ]
    },
    identity: {
      patterns: ['who are you', 'what are you', 'your name', 'introduce yourself', 'tell me about yourself'],
      responses: [
        "I'm ARIA — Artificial Responsive Intelligence Assistant. I'm your personal offline AI assistant, built to help you anytime, even without internet. I can answer questions, tell jokes, help with math, give information, and much more!",
        "My name is ARIA. I'm an AI assistant designed to work offline on your device. Think of me as your smart companion — always here, always ready!"
      ]
    },
    capabilities: {
      patterns: ['what can you do', 'your features', 'help me', 'capabilities', 'what do you know'],
      responses: [
        "Here's what I can do:\n\n💬 Answer general questions\n🧮 Do math calculations\n😄 Tell jokes & fun facts\n🕐 Tell you the time & date\n🌍 Share knowledge on many topics\n🗣️ Speak responses aloud\n📱 Work completely offline!\n\nJust ask me anything!"
      ]
    },
    jokes: {
      patterns: ['joke', 'funny', 'make me laugh', 'humor', 'tell me something funny'],
      responses: [
        "Why don't scientists trust atoms? Because they make up everything! 😄",
        "I told my computer I needed a break. Now it won't stop sending me Kit-Kat ads! 😂",
        "Why do programmers prefer dark mode? Because light attracts bugs! 🐛",
        "What do you call a fish without eyes? A fsh! 🐟",
        "Why did the smartphone go to school? To improve its cell-f! 📱",
        "I asked SIRI to tell me a joke. She said she didn't understand the question. I'm funnier than SIRI! 😂"
      ]
    },
    facts: {
      patterns: ['fun fact', 'interesting fact', 'did you know', 'tell me something', 'random fact'],
      responses: [
        "🌍 Did you know? The Earth is not perfectly round — it's slightly flattened at the poles and bulging at the equator!",
        "🐙 Octopuses have three hearts, blue blood, and nine brains! Each arm has its own mini-brain.",
        "⚡ Lightning strikes the Earth about 100 times every single second!",
        "🍯 Honey never spoils. Archaeologists found 3000-year-old honey in Egyptian tombs — still edible!",
        "🌙 A day on the Moon lasts about 29.5 Earth days!",
        "🦷 Tooth enamel is the hardest substance in the human body — even harder than bone!",
        "🐘 Elephants are the only animals that can't jump. But they're also the only ones who don't need to!"
      ]
    },
    time: {
      patterns: ['time', 'what time', 'current time', 'clock'],
      responses: ['dynamic_time']
    },
    date: {
      patterns: ['date', 'what day', 'today', 'day is it', 'what is today'],
      responses: ['dynamic_date']
    },
    math: {
      patterns: ['calculate', 'what is', 'math', 'equals', 'plus', 'minus', 'multiply', 'divide', 'percent'],
      responses: ['dynamic_math']
    },
    weather: {
      patterns: ['weather', 'temperature', 'rain', 'sunny', 'forecast'],
      responses: [
        "I don't have access to live weather data in offline mode. Once you go online, I'll be able to give you real-time weather! For now, check your phone's weather app. 🌤️"
      ]
    },
    thanks: {
      patterns: ['thank you', 'thanks', 'appreciate', 'helpful', 'great job'],
      responses: [
        "You're welcome! Happy to help anytime. 😊",
        "Glad I could help! Is there anything else you need?",
        "Anytime! That's what I'm here for. 🤖",
        "My pleasure! Feel free to ask me anything else."
      ]
    },
    bye: {
      patterns: ['bye', 'goodbye', 'see you', 'later', 'good night', 'cya'],
      responses: [
        "Goodbye! Have a wonderful day! 👋",
        "See you later! I'll be right here when you need me. 🤖",
        "Take care! Come back anytime. 😊",
        "Bye! Stay awesome! ✨"
      ]
    },
    ai: {
      patterns: ['artificial intelligence', 'machine learning', 'ai', 'neural network', 'deep learning'],
      responses: [
        "AI (Artificial Intelligence) is the simulation of human intelligence in machines. It includes:\n\n🧠 Machine Learning — computers learning from data\n🔍 Deep Learning — neural networks inspired by the brain\n🗣️ NLP — understanding human language\n👁️ Computer Vision — understanding images\n\nI myself am a form of AI — though a lightweight offline version!"
      ]
    },
    phone: {
      patterns: ['oppo', 'phone', 'smartphone', 'android', 'mobile'],
      responses: [
        "Your Oppo A53 is a solid Android smartphone! It runs Android OS and has great features for daily use. I'm designed to run efficiently on your device even without internet! 📱"
      ]
    },
    default: [
      "That's an interesting question! In offline mode, my knowledge is limited. Once we add online mode, I'll be able to answer everything! For now, can you rephrase or ask something else?",
      "Hmm, I'm thinking... My offline brain is working on it! This topic might need my online mode to answer fully. Try asking something else!",
      "Great question! My offline knowledge base is still growing. I'm better at general topics, math, time, jokes, and facts. What else can I help with?",
      "I want to give you the best answer! This specific question is beyond my current offline knowledge. Once we activate online mode, I'll be unstoppable! 🚀"
    ]
  };

  // ─── Smart Response Engine ──────────────────────────────────────────────────
  function getResponse(input) {
    const text = input.toLowerCase().trim();

    // Math detection
    if (/[\d\+\-\*\/\(\)\.\%\^]/.test(text) && /[\d]/.test(text)) {
      try {
        const expr = text.replace(/[^0-9\+\-\*\/\(\)\.\%]/g, '');
        if (expr.length > 0) {
          const result = Function('"use strict"; return (' + expr + ')')();
          if (!isNaN(result)) return `🧮 The answer is: **${result}**`;
        }
      } catch(e) {}
    }

    // Check each category
    for (const [cat, data] of Object.entries(KB)) {
      if (cat === 'default') continue;
      if (data.patterns && data.patterns.some(p => text.includes(p))) {
        if (data.responses[0] === 'dynamic_time') {
          return `🕐 Current time: **${new Date().toLocaleTimeString()}**`;
        }
        if (data.responses[0] === 'dynamic_date') {
          return `📅 Today is: **${new Date().toLocaleDateString('en-US', {weekday:'long', year:'numeric', month:'long', day:'numeric'})}**`;
        }
        if (data.responses[0] === 'dynamic_math') {
          return "Please type your math expression like: 25 + 75 or 100 * 3.5 and I'll calculate it! 🧮";
        }
        const arr = data.responses;
        return arr[Math.floor(Math.random() * arr.length)];
      }
    }

    // Default
    const def = KB.default;
    return def[Math.floor(Math.random() * def.length)];
  }

  // ─── Format bold text ───────────────────────────────────────────────────────
  function formatText(text) {
    return text
      .replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>')
      .replace(/\n/g, '<br>');
  }

  // ─── Chat Logic ─────────────────────────────────────────────────────────────
  let messageCount = 0;

  function getTime() {
    return new Date().toLocaleTimeString([], {hour: '2-digit', minute: '2-digit'});
  }

  function hideWelcome() {
    const w = document.getElementById('welcome');
    if (w) w.remove();
  }

  function addMessage(text, sender) {
    hideWelcome();
    messageCount++;
    const chat = document.getElementById('chat');
    const div = document.createElement('div');
    div.className = `message ${sender}`;

    const avatar = sender === 'ai' ? '🤖' : '👤';
    const formattedText = formatText(text);
    const msgId = 'msg_' + messageCount;

    div.innerHTML = `
      <div class="msg-avatar">${avatar}</div>
      <div>
        <div class="bubble">${formattedText}</div>
        <div class="msg-actions">
          <span class="bubble-time">${getTime()}</span>
          ${sender === 'ai' ? `<button class="speak-btn" onclick="speakText('${msgId}', \`${text.replace(/`/g,'').replace(/'/g,'')}\`)">🔊</button>` : ''}
        </div>
      </div>
    `;

    chat.appendChild(div);
    chat.scrollTop = chat.scrollHeight;
    return div;
  }

  function showTyping() {
    hideWelcome();
    const chat = document.getElementById('chat');
    const div = document.createElement('div');
    div.className = 'message ai';
    div.id = 'typing';
    div.innerHTML = `
      <div class="msg-avatar">🤖</div>
      <div class="bubble">
        <div class="typing"><span></span><span></span><span></span></div>
      </div>
    `;
    chat.appendChild(div);
    chat.scrollTop = chat.scrollHeight;
  }

  function removeTyping() {
    const t = document.getElementById('typing');
    if (t) t.remove();
  }

  function sendMessage() {
    const input = document.getElementById('userInput');
    const text = input.value.trim();
    if (!text) return;

    input.value = '';
    input.style.height = 'auto';
    addMessage(text, 'user');

    showTyping();

    // Simulate thinking delay
    const delay = 600 + Math.random() * 800;
    setTimeout(() => {
      removeTyping();
      const response = getResponse(text);
      addMessage(response, 'ai');
      autoSpeak(response);
    }, delay);
  }

  function sendSuggestion(text) {
    document.getElementById('userInput').value = text;
    sendMessage();
  }

  // ─── Voice Input ────────────────────────────────────────────────────────────
  let recognition = null;
  let isListening = false;

  function toggleVoice() {
    if (isListening) {
      stopListening();
    } else {
      startListening();
    }
  }

  function startListening() {
    if (!('webkitSpeechRecognition' in window) && !('SpeechRecognition' in window)) {
      addMessage("Voice input isn't supported in this browser. Please type your message instead.", 'ai');
      return;
    }

    const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
    recognition = new SR();
    recognition.lang = 'en-US';
    recognition.continuous = false;
    recognition.interimResults = false;

    recognition.onstart = () => {
      isListening = true;
      document.getElementById('micBtn').classList.add('listening');
      document.getElementById('voiceOverlay').classList.add('active');
    };

    recognition.onresult = (e) => {
      const transcript = e.results[0][0].transcript;
      stopListening();
      document.getElementById('userInput').value = transcript;
      sendMessage();
    };

    recognition.onerror = () => stopListening();
    recognition.onend = () => stopListening();

    recognition.start();
  }

  function stopListening() {
    isListening = false;
    document.getElementById('micBtn').classList.remove('listening');
    document.getElementById('voiceOverlay').classList.remove('active');
    if (recognition) { recognition.abort(); recognition = null; }
  }

  // ─── Voice Output ───────────────────────────────────────────────────────────
  let autoSpeakEnabled = true;

  function speakText(id, text) {
    if (!('speechSynthesis' in window)) return;
    window.speechSynthesis.cancel();
    const utter = new SpeechSynthesisUtterance(text.replace(/<[^>]*>/g, '').replace(/[🤖💡🧮🌍😄🕐📅]/g, ''));
    utter.lang = 'en-US';
    utter.rate = 0.95;
    utter.pitch = 1.0;
    window.speechSynthesis.speak(utter);
  }

  function autoSpeak(text) {
    if (!autoSpeakEnabled) return;
    if (!('speechSynthesis' in window)) return;
    window.speechSynthesis.cancel();
    const clean = text.replace(/<[^>]*>/g, '').replace(/[\u{1F300}-\u{1FFFF}]/gu, '');
    const utter = new SpeechSynthesisUtterance(clean);
    utter.lang = 'en-US';
    utter.rate = 0.95;
    window.speechSynthesis.speak(utter);
  }

  // ─── Check Internet & Update Mode Badge ─────────────────────────────────────
  function updateMode() {
    const badge = document.getElementById('modeBadge');
    if (navigator.onLine) {
      badge.textContent = 'ONLINE';
      badge.className = 'mode-badge online';
    } else {
      badge.textContent = 'OFFLINE';
      badge.className = 'mode-badge offline';
    }
  }

  window.addEventListener('online', updateMode);
  window.addEventListener('offline', updateMode);
  updateMode();

  // ─── Auto-resize textarea ───────────────────────────────────────────────────
  document.getElementById('userInput').addEventListener('input', function() {
    this.style.height = 'auto';
    this.style.height = Math.min(this.scrollHeight, 100) + 'px';
  });

  document.getElementById('userInput').addEventListener('keydown', function(e) {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      sendMessage();
    }
  });
</script>
</body>
</html>
